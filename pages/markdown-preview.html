<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview — Utilify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/themes.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        .preview-content h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0 0 0.75rem;
            letter-spacing: -0.02em;
        }

        .preview-content h2 {
            font-size: 1.375rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
            letter-spacing: -0.02em;
        }

        .preview-content h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 1.25rem 0 0.5rem;
        }

        .preview-content p {
            margin: 0 0 0.75rem;
            line-height: 1.65;
            color: var(--color-text-secondary);
        }

        .preview-content ul,
        .preview-content ol {
            margin: 0 0 0.75rem;
            padding-left: 1.5rem;
            color: var(--color-text-secondary);
        }

        .preview-content li {
            margin-bottom: 0.25rem;
            line-height: 1.65;
        }

        .preview-content ul li {
            list-style: disc;
        }

        .preview-content ol li {
            list-style: decimal;
        }

        .preview-content code {
            font-family: var(--font-mono);
            font-size: 0.875em;
            background: var(--color-code-bg);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .preview-content pre {
            background: var(--color-code-bg);
            padding: 1rem;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 0 0 0.75rem;
        }

        .preview-content pre code {
            background: none;
            padding: 0;
        }

        .preview-content blockquote {
            border-left: 3px solid var(--color-border);
            padding-left: 1rem;
            color: var(--color-text-secondary);
            margin: 0 0 0.75rem;
        }

        .preview-content a {
            color: var(--color-text);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .preview-content hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 1.5rem 0;
        }

        .preview-content strong {
            font-weight: 600;
            color: var(--color-text);
        }

        .preview-content em {
            font-style: italic;
        }

        .md-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-lg);
        }

        @media (max-width: 768px) {
            .md-split {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="site-logo">Utilify</a>
            <div class="header-actions">
                <button class="nav-link" onclick="CommandPalette.open()" aria-label="Search tools"><svg
                        xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg><span>Search</span></button>
                <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon"
                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg></button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="tool-header reveal">
            <a href="../index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>Back to tools</a>
            <h1>Markdown Preview</h1>
            <p>Write Markdown on the left, see rendered HTML on the right.</p>
        </div>

        <div class="tool-container reveal">
            <div class="md-split">
                <div class="panel">
                    <div class="panel-header">
                        <h3>Markdown</h3><button class="btn btn-ghost btn-sm" id="clear-btn">Clear</button>
                    </div>
                    <div class="panel-body"><textarea id="input" class="textarea-field" rows="20"
                            placeholder="# Hello World&#10;&#10;Write your **Markdown** here…"></textarea></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <h3>Preview</h3><button class="btn btn-primary btn-sm" id="copy-html-btn">Copy HTML</button>
                    </div>
                    <div class="panel-body">
                        <div id="preview" class="preview-content" style="min-height:200px"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-inner">
                <p>&copy; 2024 Utilify</p>
            </div>
        </div>
    </footer>
    <div id="command-overlay" class="command-overlay" role="dialog">
        <div class="command-palette">
            <div class="command-input-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg><input type="text" class="command-input" placeholder="Search tools…" autocomplete="off"></div>
            <div class="command-results"></div>
            <div class="command-footer"><span><kbd>↑↓</kbd> Navigate</span><span><kbd>↵</kbd>
                    Open</span><span><kbd>Esc</kbd> Close</span></div>
        </div>
    </div>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/toast.js"></script>
    <script src="../assets/js/search.js"></script>
    <script src="../assets/js/transitions.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/tools/markdown-preview.js"></script>
</body>

</html>
