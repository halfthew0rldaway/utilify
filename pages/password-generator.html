<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator — Utilify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/themes.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    
</head>
<body>
    <header class="site-header"><div class="header-inner"><a href="../" class="site-logo">Utilify</a><div class="header-actions"><button class="nav-link" onclick="CommandPalette.open()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><span>Search</span></button><button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button></div></div></header>

    <div class="container">
        <div class="tool-header reveal">
            <a href="../" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Back to tools</a>
            <h1>Password Generator</h1>
            <p>Generate strong passwords with custom length, symbols, and strength indicator.</p>
        </div>
        <div class="tool-container reveal">
            <div class="panel">
                <div class="panel-header"><h3>Generated Password</h3><button class="btn btn-primary btn-sm" id="copy-btn">Copy</button></div>
                <div class="panel-body">
                    <div id="password-output" style="font-family:var(--font-mono);font-size:1.5rem;word-break:break-all;padding:var(--space-lg);background:var(--color-code-bg);border-radius:var(--radius-md);text-align:center;letter-spacing:0.05em;min-height:3rem;display:flex;align-items:center;justify-content:center"></div>
                    <div class="mt-md"><label class="label">Strength</label><div style="height:6px;background:var(--color-border);border-radius:3px;overflow:hidden"><div id="strength-bar" style="height:100%;border-radius:3px;transition:all 0.3s"></div></div><span id="strength-label" style="font-size:var(--text-xs);color:var(--color-text-tertiary);margin-top:4px;display:inline-block"></span></div>
                </div>
            </div>
            <div class="panel mt-lg">
                <div class="panel-header"><h3>Options</h3></div>
                <div class="panel-body">
                    <div class="mb-lg"><label class="label">Length: <span id="length-val">16</span></label><input type="range" id="length" min="4" max="64" value="16" style="width:100%"></div>
                    <div class="flex flex-wrap gap-lg">
                        <label class="toggle-wrap"><div class="toggle on" id="toggle-upper"></div><span>Uppercase (A-Z)</span></label>
                        <label class="toggle-wrap"><div class="toggle on" id="toggle-lower"></div><span>Lowercase (a-z)</span></label>
                        <label class="toggle-wrap"><div class="toggle on" id="toggle-numbers"></div><span>Numbers (0-9)</span></label>
                        <label class="toggle-wrap"><div class="toggle on" id="toggle-symbols"></div><span>Symbols (!@#$)</span></label>
                    </div>
                    <button class="btn btn-primary mt-lg" id="generate-btn">Generate Password</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer"><div class="container"><div class="footer-inner"><p>&copy; 2024 Utilify</p></div></div></footer>
    <div id="command-overlay" class="command-overlay" role="dialog"><div class="command-palette"><div class="command-input-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><input type="text" class="command-input" placeholder="Search tools…" autocomplete="off"></div><div class="command-results"></div><div class="command-footer"><span><kbd>↑↓</kbd> Navigate</span><span><kbd>↵</kbd> Open</span><span><kbd>Esc</kbd> Close</span></div></div></div>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/toast.js"></script>
    <script src="../assets/js/search.js"></script>
    <script src="../assets/js/transitions.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/tools/password-generator.js"></script>
</body>
</html>
